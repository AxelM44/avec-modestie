name: Generate Sitemap

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate-sitemap:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ⚠️ PERMISSION OBLIGATOIRE pour pousser des commits

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Nécessaire pour avoir l'historique complet

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate sitemap
        run: node generate-sitemap.js

      - name: Commit and push sitemap
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add sitemap.xml
          # Vérifie s'il y a des changements
          if ! git diff --cached --quiet; then
            git commit -m "🤖 Auto-generate sitemap.xml"
            git push
          else
            echo "Aucun changement dans sitemap.xml, pas de commit."
          fi
