name: "Aspiration wordpress"
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Nettoyage avant aspiration
        run: |
          find . -maxdepth 1 ! -name '.github' ! -name '.git' ! -name '.' -exec rm -rf {} +

      - name: Aspiration du site
        run: |
          wget --mirror \
               --convert-links \
               --adjust-extension \
               --page-requisites \
               --no-parent \
               --no-host-directories \
               --user-agent="Mozilla/5.0" \
               https://avecmodestie.wordpress.com/ || true

      - name: Nettoyage Drastique et Validation
        run: |
          find . -name "index.html" -exec sed -i '/<\/head>/i <meta name="google-site-verification" content="Brv4OkzwYgpD40vbEO3qlr3AaJtvjtyvygSRLJCx9s8" />' {} +
          find . -name "*.html" -exec sed -i '/<\/head>/i <style> #wpadminbar, .marketing-bar, #eu-cookie-law, .wp-block-search, .wpcnt, #infinite-footer, .site-info, .jetpack-instant-search, .widget_search, .entry-meta, .entry-footer, .post-navigation, .comments-area, .sharedaddy, .author-info, .tags-links, .cat-links { display: none !important; } html { margin-top: 0 !important; } body { margin-bottom: 0 !important; } </style>' {} +

          find . -name "*.html" -exec sed -i 's/Design a site like this with WordPress.com//g' {} +
          find . -name "*.html" -exec sed -i 's/Kiel komenci//g' {} +
          find . -name "*.html" -exec sed -i 's/Search powered by Jetpack//g' {} +
          find . -name "*.html" -exec sed -i 's/Serĉrezultoj//g' {} +
          find . -name "*.html" -exec sed -i 's/Serĉi//g' {} +
          find . -name "*.html" -exec sed -i 's/Proudly powered by WordPress//g' {} +

      - name: Recherche Google
        run: |
          find . -name "*.html" -exec sed -i '/<body/a <div style="padding: 20px; max-width: 800px; margin: auto; text-align: center;"><form action="https://www.google.com/search" method="get" target="_blank" onsubmit="this.q.value = this.q.value + '"'"' site:axelm44.github.io/avec-modestie'"'"'"><input type="text" name="q" placeholder="Rechercher..." style="padding: 8px; width: 60%; border: 1px solid #ccc; border-radius: 4px;"><button type="submit" style="padding: 8px 15px; margin-left: 10px; cursor: pointer; background: #333; color: white; border: none; border-radius: 4px;">Rechercher</button></form></div>' {} +

      - name: Générer le sitemap
        run: |
          BASE_URL="https://axelm44.github.io/avec-modestie"
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml
          find . -name "*.html" ! -path "./.git/*" ! -path "./.github/*" | sort | while read f; do
            CLEAN=$(echo "$f" | sed 's|^\./||')
            # Ignorer les URLs avec des paramètres de pagination (peu utiles pour le SEO)
            if echo "$CLEAN" | grep -q '?'; then
              continue
            fi
            # Échapper le & en &amp; pour la conformité XML
            URL=$(echo "${BASE_URL}/${CLEAN}" | sed 's/&/\&amp;/g')
            echo "  <url>" >> sitemap.xml
            echo "    <loc>${URL}</loc>" >> sitemap.xml
            echo "    <changefreq>weekly</changefreq>" >> sitemap.xml
            echo "    <priority>0.8</priority>" >> sitemap.xml
            echo "  </url>" >> sitemap.xml
          done
          echo '</urlset>' >> sitemap.xml

      - name: Envoi vers GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Nettoyage complet"
